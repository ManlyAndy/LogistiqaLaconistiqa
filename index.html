<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Расчёт заказа</title>
        <link rel="stylesheet" href="style.css?v=20260710_5">
    </head>
    <body>
    <div id="stars"></div>
    <div id="moon"></div>
    <div class="container">
        <h1>Logistiqa Laconistiqa</h1>
    <div class="side-panel">
        <div class="time-box">
            <div id="moscowTime">-</div>
            <div id="vladivostokTime">-</div>
        </div>
        <button id="musicToggle" class="music-btn" title="Включить/выключить музыку">
            <span class="icon">▶</span><span class="label">Музыка</span>
        </button>
        <a href="https://laconistiq.ru/" target="_blank" rel="noopener noreferrer" class="music-btn" title="Перейти на Laconistiq.ru">
            <span class="label">Laconistiq.ru</span>
            <span class="corner-icon">↗</span>
        </a>
    </div>

        <div id="items">
            <div class="item">
                <div class="autocomplete">
                    <input type="text" placeholder="название товара">
                    <div class="list"></div>
                </div>
                <input type="number" placeholder="шт" min="1">
                <button type="button" class="removeRow" title="Удалить строку">×</button>
            </div>
        </div>

        <button id="addRow">ещё</button>
        <br><br>
        <button id="total">Итого</button>
        <button id="reset">Сброс</button>
    </div>

    <div id="resultModal" class="modal hidden">
        <div class="modal-content">
            <h3>Результат расчёта</h3>
            <div id="resultText"></div>
            <button id="close">Закрыть</button>
        </div>
    </div>
    </body>
    <script src="script.js?v=20260710_9" defer></script>
    </html>
